        <h1 class="reveal-text">Evolución Sonora Absoluta</h1>
        <button class="btn-action">Escuchar Demos</button>
    </div>
</section>

<section class="mega-stage" style="background: #050505;">
    <div class="bg-kinetic-text slide-right">LAB CATÁLOGO EXPERIMENTAL BEATS STREAMING</div>
    <div class="stage-content">
        <div class="audio-lab-container">
            <div class="telemetry-status">
                <div class="pulse-dot"></div>

            </div>
            
            <div class="spectrometer">

<script>
    // Lógica del Cursor de Inercia
    const dot = document.getElementById('custom-cursor-dot');
    const ring = document.getElementById('custom-cursor-ring');

    document.addEventListener('mousemove', (e) => {
        // El punto central sigue instantáneamente
        dot.style.left = e.clientX + 'px';
        dot.style.top = e.clientY + 'px';
        
        // El anillo exterior tiene un retraso controlado por el CSS Transition (500ms)
        ring.style.left = e.clientX + 'px';
        ring.style.top = e.clientY + 'px';
    });

    // Lógica de la Navbar Dinámica
    const nav = document.getElementById('main-nav');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 50) {
            nav.classList.add('scrolled');
        } else {
            nav.classList.remove('scrolled');
        }
    });
</script>
