<script>
    // Inicializar iconos de Lucide
    lucide.createIcons();

    // Lógica del Cursor Personalizado
    const dot = document.querySelector('.cursor-dot');
    const outline = document.querySelector('.cursor-outline');

    window.addEventListener('mousemove', (e) => {
        dot.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
        
        outline.animate(
            { transform: `translate(${e.clientX - 15}px, ${e.clientY - 15}px)` }, 
            { duration: 250, fill: "forwards" }
        );
    });

    document.querySelectorAll('a, button, .gallery-item').forEach(el => {
        el.addEventListener('mouseenter', () => outline.classList.add('cursor-hover'));
        el.addEventListener('mouseleave', () => outline.classList.remove('cursor-hover'));
    });

    // Efecto Parallax Suave
    window.addEventListener('scroll', () => {
        const y = window.scrollY;
        const isMobile = window.innerWidth < 768;
        const m = isMobile ? 0 : 1;
        document.querySelector('.vanguard-title').style.transform = `translateY(${y * 0.15 * m}px)`;
        document.querySelector('.image-container').style.transform = `translateY(${y * -0.05 * m}px)`;
    });

    // Lógica del Reproductor de Audio (Corregida)
    const audio = document.getElementById('featured-audio');
    const progress = document.getElementById('main-progress');
    const timeText = document.getElementById('current-time');
    const playButton = document.querySelector('[onclick="toggleMainPlay()"]');

    // Forzar dos dígitos en minutos y segundos
    function formatTime(secs) {
        let minutes = Math.floor(secs / 60);
        let seconds = Math.floor(secs % 60);
        return `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    }

    function toggleMainPlay() {
        if (audio.paused) {
            audio.play();
            // Reemplazamos el contenedor del icono para que Lucide lo redibuje correctamente
            playButton.innerHTML = `<i data-lucide="pause" id="play-icon"></i>`;
        } else {
            audio.pause();
            playButton.innerHTML = `<i data-lucide="play" id="play-icon"></i>`;
        }
        lucide.createIcons(); // Refrescar iconos renderizados
    }

    // Leer la duración real del archivo una vez cargados sus metadatos
    audio.addEventListener('loadedmetadata', () => {
        timeText.innerText = `00:00 / ${formatTime(audio.duration)}`;
    });

    audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
            const pct = (audio.currentTime / audio.duration) * 100;
            progress.style.width = pct + '%';
            timeText.innerText = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
        }
    });

    // Resetear el reproductor automáticamente al finalizar el audio
    audio.addEventListener('ended', () => {
        progress.style.width = '0%';
        playButton.innerHTML = `<i data-lucide="play" id="play-icon"></i>`;
        lucide.createIcons();
        timeText.innerText = `00:00 / ${formatTime(audio.duration)}`;
    });
</script>
